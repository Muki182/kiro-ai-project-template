# Tooling configuration for the project scaffold.
# Mirrors the linting/testing stack declared in .kiro/steering/project.md
# (ruff, mypy, pytest). Adjust freely for your project.

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B"]

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
