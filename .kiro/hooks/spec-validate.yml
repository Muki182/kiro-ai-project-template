name: spec-validate
description: >
  当核心实现文件变更时，对照 .kiro/specs/ 中的需求列表逐条验证，
  输出当前实现与 spec 的一致性报告。

trigger:
  type: fileChange
  patterns:
    - "src/models/**/*.py"
    - "src/training/**/*.py"
    - "src/inference/**/*.py"
    - "src/data/**/*.py"
  excludePatterns:
    - "**/__init__.py"
    - "**/__pycache__/**"

agent:
  prompt: |
    以下核心实现文件发生了变更：{changedFiles}
    
    请执行 Spec 一致性验证：
    
    **第一步：定位关联 Spec**
    根据变更文件路径，找到 .kiro/specs/ 中最相关的 spec 文件。
    
    **第二步：逐条验证需求**
    对 spec 中每条 REQ-F-XX / REQ-P-XX / REQ-R-XX，判断当前实现是否满足：
    
    输出格式：
    ```
    ✅ REQ-F-01: [需求描述] — 已满足
       依据：[简述实现中对应的位置/逻辑]
    
    ⚠️  REQ-F-02: [需求描述] — 部分满足
       缺失：[描述缺少什么]
       建议：[具体补充措施]
    
    ❌ REQ-P-01: [需求描述] — 未满足
       原因：[描述差距]
       建议：[具体改进措施]
    ```
    
    **第三步：错误处理审查**
    对照 `steering/project.md` 中的「错误处理策略」和 spec 中的「错误处理实现」部分，检查变更代码：
    
    1. 是否存在裸 `except:` 或 `except Exception:` 块
    2. 是否存在静默吞没（`except: pass`、`except: return None` 且调用方无法区分正常返回和错误）
    3. 异常转换时是否使用了 `raise ... from e` 保留异常链
    4. 错误日志是否包含足够的上下文信息（参数值、状态）
    5. 外部调用是否有超时和重试配置
    
    输出格式：
    ```
    🔍 错误处理审查：
    ⚠️  [文件:行号] 裸 except 块 — 应捕获具体异常类型
    ⚠️  [文件:行号] 异常被静默吞没 — 应向上抛出或返回显式错误值
    ⚠️  [文件:行号] 缺少 `from e` — 原始异常链被丢弃
    ✅ 错误处理符合规范
    ```
    
    **第四步：任务状态建议**
    根据验证结果，建议 spec 中哪些任务 checkbox 可以勾选为完成。
    
    保持输出简洁，每条验证结果不超过 3 行。
