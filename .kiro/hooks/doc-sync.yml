name: doc-sync
description: >
  当 src/ 下的 Python 文件发生变更时，提示检查相关文档是否需要同步更新。
  适用于 docstring、README 模块说明、docs/ 下的设计文档。

trigger:
  type: fileChange
  patterns:
    - "src/**/*.py"
  excludePatterns:
    - "src/**/__pycache__/**"
    - "src/**/*.pyc"

agent:
  prompt: |
    以下文件发生了变更：{changedFiles}
    
    请执行文档同步检查：
    
    1. **Docstring 检查**
       - 检查变更函数/类的 docstring 是否与新实现一致
       - 如参数、返回值、异常有变化，更新对应 docstring
       - **重点检查 `Raises` 部分**：确认 docstring 中声明的异常类型与实际代码中 `raise` 的异常一致。新增的异常必须在 `Raises` 中记录，已移除的异常必须从 `Raises` 中删除
    
    2. **错误处理文档检查**
       - 如变更涉及异常捕获或抛出逻辑，检查：
         a. 对应 spec 中的「错误处理实现 → 异常转换规则」表格是否需要更新
         b. `steering/project.md` 中的「错误处理策略」是否仍与实现一致
         c. 新增的自定义异常是否已在异常体系中注册
    
    3. **模块文档检查**
       - 查找 docs/ 下是否有描述该模块的文档
       - 如有，检查模块接口描述是否与实现一致
    
    4. **Spec 对照**
       - 打开 .kiro/specs/ 下相关 spec 文件
       - 确认已实现的功能是否与需求描述一致
       - 如发现偏差，在 spec 对应任务下添加备注说明
    
    只输出需要更新的内容，无需更新的文件不必提及。
    如果所有文档都与实现一致，输出"文档检查通过，无需更新。"
