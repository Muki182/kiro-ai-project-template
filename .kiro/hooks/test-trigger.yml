name: test-trigger
description: >
  当接口定义文件或公开 API 发生变更时，审查现有测试用例覆盖范围，
  建议补充缺失的测试，防止接口变更引入未覆盖的回归风险。

trigger:
  type: fileChange
  patterns:
    - "src/**/*_interface.py"
    - "src/**/*_api.py"
    - "src/**/schema.py"
    - "src/**/types.py"
    - "src/**/*.proto"

agent:
  prompt: |
    接口定义文件发生了变更：{{changed_files}}
    
    请执行测试覆盖审查：
    
    **第一步：识别变更内容**
    分析变更：
    - 新增了哪些公开方法/函数/端点
    - 修改了哪些参数签名或返回类型
    - 删除或废弃了哪些接口
    
    **第二步：查找现有测试**
    在 tests/ 目录下找到对应的测试文件，列出已有的测试用例。
    
    **第三步：覆盖缺口分析**
    对照变更内容，识别以下类型的缺失用例：
    
    | 类型 | 说明 |
    |------|------|
    | 正常路径 | 标准输入下的预期输出 |
    | 边界输入 | 空值、极值、类型边界 |
    | 异常路径 | 错误输入应触发的异常 |
    | 回归测试 | 本次变更可能破坏的已有行为 |
    
    **第四步：输出建议**
    为每个缺失用例提供具体的测试代码骨架：
    
    ```python
    def test_[描述]_[场景](self):
        """
        场景：[描述]
        关联变更：[变更文件中的具体位置]
        """
        # Arrange
        ...
        # Act
        ...
        # Assert
        ...
    ```
    
    优先级：高（回归风险）> 中（新功能）> 低（边界用例）
    
    如果现有测试已完全覆盖所有变更，输出"测试覆盖完整，无需补充。"
