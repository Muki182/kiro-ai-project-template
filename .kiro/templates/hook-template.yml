# Kiro Hook 模板
# 使用方式：复制此文件到 .kiro/hooks/ 并按需修改
# 生成工具：scripts/create-hook.sh

name: {{HOOK_NAME}}
description: >
  {{DESCRIPTION}}

trigger:
  # 可选类型：fileChange / manual
  type: fileChange
  patterns:
    - "{{TRIGGER_PATTERN}}"
  # 共享排除模式 —— 所有 Python 项目 hook 应包含以下排除项：
  # （参见 .kiro/shared/python-excludes.yml）
  excludePatterns:
    - "**/__pycache__/**"
    - "**/*.pyc"
    - "**/__init__.py"

agent:
  prompt: |
    以下文件发生了变更：{changedFiles}
    
    请执行以下检查：
    
    **第一步：{{STEP_1_TITLE}}**
    {{STEP_1_CONTENT}}
    
    **第二步：{{STEP_2_TITLE}}**
    {{STEP_2_CONTENT}}
    
    **第三步：{{STEP_3_TITLE}}**
    {{STEP_3_CONTENT}}
    
    {{OUTPUT_FORMAT}}
